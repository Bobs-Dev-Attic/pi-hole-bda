name: Security shell checks

on:
  pull_request:
  push:
    branches:
      - master
      - development

jobs:
  shellcheck-semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/shell
